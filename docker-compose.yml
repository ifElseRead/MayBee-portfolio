version: "3.8"

services:
    # The PHP-FPM & Node Application Container
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: maybee-portfolio-app
        container_name: maybee_portfolio_app
        restart: unless-stopped
        tty: true
        environment:
            SERVICE_NAME: app
            SERVICE_TAGS: dev
        volumes:
            - .:/var/www
            # Mount a permanent volume specifically for your database file
            - maybee_db:/var/www/database_persistent
        networks:
            - portfolio-network

    # The Nginx Web Server Container
    webserver:
        image: nginx:alpine
        container_name: maybee_portfolio_nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./docker-compose/nginx:/etc/nginx/conf.d/
        networks:
            - portfolio-network

networks:
    portfolio-network:
        driver: bridge

# Crucial: You must declare the named volume down here so Docker knows to allocate permanent space for it
volumes:
    maybee_db:
        driver: local
