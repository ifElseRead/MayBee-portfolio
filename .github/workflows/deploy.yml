name: Continuous Deployment Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy codebase updates via SSH remote execution
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. Step directly into your verified folder path
            cd /var/www/maybee-portfolio

            # 2. Reclaim ownership states over container build items
            chown -R root:root .

            # 3. Pull updates first so Git learns what files are now tracked
            git fetch origin main
            git reset --hard origin/main

            # 4. Now clean out safe in the knowledge of what files are tracked
            git clean -fd

            # 5. Run setup routines natively right here where docker-compose.yml lives
            docker compose exec -T app composer install --no-interaction --optimize-autoloader
            docker compose exec -T app npm run build
            docker compose exec -T app php artisan optimize:clear
