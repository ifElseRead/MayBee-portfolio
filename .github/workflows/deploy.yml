name: Continuous Deployment Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy codebase updates via SSH remote execution
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. Step directly into your verified folder path
            cd /var/www/maybee-portfolio

            # 2. Pull down fresh code records first
            git fetch origin main
            git reset --hard origin/main

            # 3. Clean out actual untracked files safely, EXCLUDING persistent local assets
            # This protects your database folder and storage assets from being wiped
            git clean -fd -e database_persistent/ -e storage/

            # 4. Reclaim clean code layout ownership to root before installing dependencies
            chown -R root:root .

            # 5. Build the stack using targeted short-lived containers
            docker compose run --rm app composer install --no-interaction --optimize-autoloader
            docker compose run --rm app npm install
            docker compose run --rm app npm run build

            # 6. Build the database tables, then clear the cache
            docker compose run --rm app php artisan migrate --force
            docker compose run --rm app php artisan optimize:clear

            # 7. CRUCIAL PERMISSION FIX: Restore permissions to the web server user
            # This ensures Laravel can write sessions, logs, and touch the SQLite file
            chown -R www-data:www-data storage bootstrap/cache database_persistent
            chmod -R 775 storage bootstrap/cache database_persistent
            # Ensure the container itself registers the permission state at the end of deployment
            docker compose exec -T app chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache
            docker compose exec -T app chmod -R 775 /var/www/storage /var/www/bootstrap/cache

            # 8. Restart the containers to apply all changes
            docker compose down
            docker compose up -d
