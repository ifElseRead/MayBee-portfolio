name: Continuous Deployment Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy codebase updates via SSH remote execution
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. Step directly into your verified folder path
            cd /var/www/maybee-portfolio

            # 2. Pull down fresh code records first
            git fetch origin main
            git reset --hard origin/main

            # 3. Clean out actual untracked files safely, EXCLUDING persistent local assets
            # This protects your database folder and storage assets from being wiped
            git clean -fd -e database_persistent/ -e storage/ -e docker-compose/nginx/

            # 4. Reclaim clean code layout ownership to root before installing dependencies
            chown -R root:root .

            # 5. Build the stack using targeted short-lived containers
            docker compose run --rm app composer install --no-interaction --optimize-autoloader
            docker compose run --rm app npm install
            docker compose run --rm app npm run build

            # 6. Bring down old instances and BOOT UP the active containers first
            docker compose down
            docker compose up -d

            # 7. Execute database updates on the active, running stack
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan optimize:clear

            # 8. CRUCIAL PERMISSION RESCUE (Applied directly to the live containers)
            # Fix Host permissions
            chown -R www-data:www-data storage bootstrap/cache database_persistent
            chmod -R 775 storage bootstrap/cache database_persistent

            # Fix Container-side permissions for the database and framework assets
            docker compose exec -T app chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache /var/www/database_persistent
            docker compose exec -T app chmod -R 775 /var/www/storage /var/www/bootstrap/cache /var/www/database_persistent
