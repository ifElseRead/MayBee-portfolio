name: Continuous Deployment Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy codebase updates via SSH remote execution
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. Step directly into your verified folder path
            cd /var/www/maybee-portfolio

            # 2. Reclaim ownership states over container build items
            chown -R root:root .

            # 3. Pull down fresh code records first
            git fetch origin main
            git reset --hard origin/main

            # 4. Clean out actual untracked files safely
            git clean -fd

            # 5. Use targeted "run" containers to process your stack builds completely detached from the host namespace
            docker compose run --rm app composer install --no-interaction --optimize-autoloader
            docker compose run --rm app npm run build
            docker compose run --rm app php artisan optimize:clear
