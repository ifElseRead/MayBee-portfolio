name: Continuous Deployment Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy codebase updates via SSH remote execution
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. Step dynamically into your custom repository folder variable
            cd /var/www/maybee-portfolio

            # 2. Reclaim ownership states over container build items
            chown -R root:root .

            # 3. Purge untracked variations (your compose file is safe now!)
            git reset --hard
            git clean -fd

            # 4. Fetch the freshest changes from GitHub upstream
            git fetch origin main
            git reset --hard origin/main

            # 5. Run execution commands natively side-by-side with your compose file
            docker compose exec -T app composer install --no-interaction --optimize-autoloader
            docker compose exec -T app npm run build
            docker compose exec -T app php artisan optimize:clear
