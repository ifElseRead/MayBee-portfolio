name: Continuous Deployment Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy codebase updates via SSH remote execution
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. Navigate to your deployment workspace directory
            cd /var/www/maybee-portfolio/MayBee-portfolio

            # 2. Force ownership back to root so Git can safely manipulate the files
            chown -R root:root .

            # 3. Force-wipe any lingering untracked assets or build artifacts
            git reset --hard
            git clean -fd

            # 4. Pull down the freshest code from your main GitHub branch
            git fetch origin main
            git reset --hard origin/main

            # 5. Handle backend dependencies safely inside the Docker container
            docker compose exec -T app composer install --no-interaction --optimize-autoloader

            # 6. Recompile your Vite production assets over the shared volume pipeline
            docker compose exec -T app npm run build

            # 7. Flush out old optimization cache maps completely
            docker compose exec -T app php artisan optimize:clear
